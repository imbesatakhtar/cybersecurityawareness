services:
  # BACKEND SERVER (Node.js)
  - type: web
    name: secure-auth-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true 
      - key: MONGO_URI
        sync: false 
      - key: CLIENT_URL
        sync: false 

  # FRONTEND CLIENT (React/Vite)
  - type: web
    name: secure-auth-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        sync: false
